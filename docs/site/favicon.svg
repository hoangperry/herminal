<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark surface, terminal cursor block in herminal accent. -->
  <rect width="32" height="32" rx="6" fill="#15171c"/>
  <!-- Solid blinkless cursor block. SVG can't honour CSS blink without JS,
       so we ship the static "filled" state — recognisable at 16×16. -->
  <rect x="8" y="9" width="6" height="14" fill="#53d3c8"/>
  <!-- Prompt arrow next to the cursor to read as terminal at a glance. -->
  <path d="M17 13 L23 16 L17 19 Z" fill="#9BA3AF"/>
</svg>
